  .cta .blk{ display:inline-block; width:0.55em; height:1em; background:var(--bg);

  .cta:active{ transform:translateY(2px); }
  @keyframes ctaPulse{ 0%,100%{ box-shadow:0 0 0 1px var(--bg), 0 0 14px rgba(0,175,254,0.35); }
    50%{ box-shadow:0 0 0 1px var(--bg), 0 0 24px rgba(0,175,254,0.6); } }

  .or{ text-align:center; font-size:9px; letter-spacing:0.18em; text-transform:uppercase;

  /* SECONDARY links — quieter */

  .player iframe{ display:block; border-radius:10px; width:100%; }

  footer{ margin-top:24px; text-align:center; font-size:10px; opacity:0.5; line-height:1.9; }

  /* STICKY Spotify CTA — always one tap away */
  .sticky{ position:fixed; left:0; right:0; bottom:0; z-index:9100;
    display:flex; justify-content:center; padding:12px 14px calc(12px + env(safe-area-inset-bottom));

  .sticky a{ width:100%; max-width:412px; animation:none; }
  @media (prefers-reduced-motion:reduce){ .sticky{ transition:none; } .cta{ animation:none; } }

<script>
(function(){
  var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // ── PIXELATED DRIFTING CLOUDS ──
  (function sky(){
    var cv = document.getElementById('sky'); if(!cv) return;
    var ctx = cv.getContext('2d');
    var PX = 7;                          // size of each "pixel" block
    var buf = document.createElement('canvas'), bctx = buf.getContext('2d');
    var bw, bh, clouds = [];
    function rand(a,b){ return a + Math.random()*(b-a); }
    function makeCloud(){
      var n = Math.floor(rand(4,7)), base = rand(7,14), puffs = [];
      for(var i=0;i<n;i++){
        puffs.push({ dx:rand(-base*1.5, base*1.5), dy:rand(-base*0.4, base*0.45), r:rand(base*0.6, base) });
      }
      return { x:0, y:rand(2, bh*0.78), speed:rand(3,9), alpha:rand(0.4,0.85), puffs:puffs };
    }
    function resize(){
      cv.width = window.innerWidth; cv.height = window.innerHeight;
      bw = Math.ceil(cv.width/PX); bh = Math.ceil(cv.height/PX);
      buf.width = bw; buf.height = bh;
      if(!clouds.length){
        var count = Math.max(4, Math.round(cv.width/200));
        for(var i=0;i<count;i++){ var c = makeCloud(); c.x = rand(0, bw); clouds.push(c); }
      }
    }
    function draw(dt){
      bctx.clearRect(0,0,bw,bh);
      bctx.fillStyle = '#9fd4ff';
      for(var i=0;i<clouds.length;i++){
        var c = clouds[i];
        c.x -= c.speed*dt;
        if(c.x < -30){ c.x = bw + rand(8,50); c.y = rand(2, bh*0.78); c.speed = rand(3,9); }
        bctx.globalAlpha = c.alpha;
        for(var j=0;j<c.puffs.length;j++){
          var p = c.puffs[j];
          bctx.beginPath(); bctx.arc(c.x+p.dx, c.y+p.dy, p.r, 0, Math.PI*2); bctx.fill();
        }
      }
      bctx.globalAlpha = 1;
      ctx.clearRect(0,0,cv.width,cv.height);
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(buf, 0,0,bw,bh, 0,0,cv.width,cv.height);
    }
    resize();
    window.addEventListener('resize', resize);
    if(reduce){ draw(0); return; }
    var last = performance.now();
    (function loop(t){ var dt = Math.min(0.05, (t-last)/1000) || 0; last = t; draw(dt); requestAnimationFrame(loop); })(last);
  })();

  // ── OUTBOUND CLICK TRACKING (GA4 + Meta Pixel) ──
  document.querySelectorAll('a[data-track]').forEach(function(a){
    a.addEventListener('click', function(){
      var label = a.getAttribute('data-track'), dest = a.href;
      if(typeof gtag === 'function'){
        gtag('event', 'outbound_click', { link_label: label, link_url: dest, transport_type: 'beacon' });
      }
      if(typeof fbq === 'function'){
        if(/Spotify|Apple Music|YouTube/i.test(label)){ fbq('track', 'Lead', { content_name: label }); }
        else { fbq('trackCustom', 'LinkClick', { link_label: label, link_url: dest }); }
      }
    });
  });

  // ── STICKY Spotify CTA: reveal once the primary button scrolls out of view ──
  var primary = document.getElementById('primary'), sticky = document.getElementById('sticky');
  if(primary && sticky && 'IntersectionObserver' in window){
    new IntersectionObserver(function(entries){
      sticky.classList.toggle('show', !entries[0].isIntersecting);
      sticky.setAttribute('aria-hidden', String(entries[0].isIntersecting));
    }, { threshold: 0 }).observe(primary);
  }
})();
</script>
