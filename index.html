<style>
  :root{

  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{ -webkit-text-size-adjust:100%; background:var(--bg); }
  body{
    background:var(--page-bg); background-attachment:fixed; color:var(--ink);
    font-family:var(--mono); font-size:15px; line-height:1.55;
    min-height:100vh; overflow-x:hidden; text-shadow:var(--glow);
    cursor:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='28'%20height='28'%20viewBox='0%200%2028%2028'%3E%3Cg%20stroke='%2300AFFE'%20stroke-width='2'%20stroke-linecap='round'%3E%3Ccircle%20cx='14'%20cy='14'%20r='5'%20fill='%2300AFFE'/%3E%3Cline%20x1='14'%20y1='1'%20x2='14'%20y2='5'/%3E%3Cline%20x1='14'%20y1='23'%20x2='14'%20y2='27'/%3E%3Cline%20x1='1'%20y1='14'%20x2='5'%20y2='14'/%3E%3Cline%20x1='23'%20y1='14'%20x2='27'%20y2='14'/%3E%3Cline%20x1='4'%20y1='4'%20x2='7'%20y2='7'/%3E%3Cline%20x1='21'%20y1='21'%20x2='24'%20y2='24'/%3E%3Cline%20x1='21'%20y1='7'%20x2='24'%20y2='4'/%3E%3Cline%20x1='4'%20y1='24'%20x2='7'%20y2='21'/%3E%3C/g%3E%3C/svg%3E") 14 14, auto;
  }
  a{ color:inherit; text-decoration:none; -webkit-tap-highlight-color:transparent; cursor:inherit; }

  /* pixel-cloud sky */
  #sky{ position:fixed; inset:0; z-index:0; pointer-events:none;
    image-rendering:pixelated; image-rendering:crisp-edges; opacity:0.3; }


  .term{ position:relative; z-index:1; width:100%; max-width:440px; margin:0 auto; min-height:100vh;
    border-left:1px solid var(--pink-faint); border-right:1px solid var(--pink-faint);
    padding:0 16px 120px; }
  @media (max-width:480px){ .term{ border:none; padding:0 14px 120px; } }

  .titlebar{ display:flex; align-items:center; gap:10px; padding:11px 2px 10px;

  .tb-dots i{ width:9px; height:9px; border:1px solid var(--pink); display:block; }

  .tb-name{ opacity:0.85; }
  .tb-stat{ margin-left:auto; opacity:0.5; font-size:9px; }
  .tb-stat .on{ color:var(--pink-hi); animation:blink 1.4s step-end infinite; }

  header{ padding:20px 0 2px; }
  .logo{ font-family:var(--pixel); font-size:30px; line-height:1; letter-spacing:0.18em;
    text-transform:uppercase; color:var(--pink-hi); text-shadow:0 0 10px rgba(0,175,254,0.45); }

  .eyebrow{ font-size:11px; opacity:0.6; letter-spacing:0.14em; text-transform:uppercase; margin:2px 0 6px; }
  .title{ font-family:'Press Start 2P',var(--mono); font-size:42px; line-height:1; letter-spacing:0.02em;

    text-shadow:0 0 12px rgba(0,175,254,0.5); }
  @media (max-width:440px){ .title{ font-size:34px; } }
  @media (max-width:340px){ .title{ font-size:28px; } }


  .status{ font-size:13px; letter-spacing:0.1em; margin-bottom:16px; color:var(--pink-hi); font-weight:700; }
  .status .spark{ animation:blink 1.6s step-end infinite; }

  /* cover art — the hook */
  .cover{ display:block; position:relative; width:100%; margin:4px 0 18px;
    border:1px solid var(--pink); overflow:hidden; line-height:0; }
  .cover img{ width:100%; height:auto; display:block; filter:saturate(1.05) contrast(1.03); transition:filter .25s; }
  .cover::after{ content:''; position:absolute; inset:0; pointer-events:none;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,0) 0 2px, rgba(0,0,0,0.10) 2px 3px);
    mix-blend-mode:multiply; }
  .cover .tag{ position:absolute; top:8px; right:8px; font-family:var(--pixel); font-size:8px;
    letter-spacing:0.14em; color:var(--bg); background:var(--pink); padding:5px 7px;
    animation:blink 1.6s step-end infinite; }
  .cover:hover img{ filter:saturate(1.18) contrast(1.07); }

  /* PRIMARY CTA — on-theme, terminal-styled */
  .cta{ display:flex; align-items:center; justify-content:center; gap:10px;
    background:var(--pink); color:var(--bg); border:1px solid var(--pink);
    padding:18px 16px; font-family:var(--mono); font-size:16px; font-weight:700; letter-spacing:0.04em;
    box-shadow:0 0 0 1px var(--bg), 0 0 18px rgba(0,175,254,0.45);
    transition:transform .08s, box-shadow .2s, background .12s;
    animation:ctaPulse 2.4s ease-in-out infinite; }
  .cta .blk{ display:inline-block; width:0.55em; height:1em; background:var(--bg);
    vertical-align:-1px; animation:blink .8s step-end infinite; }
  .cta:hover{ box-shadow:0 0 0 1px var(--bg), 0 0 26px rgba(0,175,254,0.7); }
  .cta:active{ transform:translateY(2px); }
  @keyframes ctaPulse{ 0%,100%{ box-shadow:0 0 0 1px var(--bg), 0 0 14px rgba(0,175,254,0.35); }
    50%{ box-shadow:0 0 0 1px var(--bg), 0 0 24px rgba(0,175,254,0.6); } }

  /* in-app browser escape banner */
  .iab-banner{ position:sticky; top:0; z-index:9200; text-align:center;
    background:var(--pink); color:var(--bg); font-family:var(--mono); font-weight:700;
    font-size:12px; line-height:1.4; letter-spacing:0.02em; padding:10px 14px;
    box-shadow:0 0 18px rgba(0,175,254,0.5); text-shadow:none; }
  .iab-banner b{ font-weight:800; }

  /* quiet secondary link — signals choice / legitimacy */
  .alt-link{ display:block; text-align:center; margin:14px 0 2px; font-size:11px;
    letter-spacing:0.06em; opacity:0.5; transition:opacity .15s; }
  .alt-link:hover,.alt-link:focus-visible{ opacity:0.85; outline:none; }

  footer{ margin-top:24px; text-align:center; font-size:10px; line-height:2;

  footer .stars{ display:block; font-size:12px; letter-spacing:0.4em; color:var(--pink-hi);
    text-shadow:0 0 8px rgba(0,175,254,0.55); }

  /* STICKY Spotify CTA — always one tap away */
  .sticky{ position:fixed; left:0; right:0; bottom:0; z-index:9100;
    display:flex; justify-content:center; padding:12px 14px calc(12px + env(safe-area-inset-bottom));
    background:linear-gradient(180deg, rgba(10,31,51,0) 0%, #0a1f33 42%);
    transform:translateY(120%); transition:transform .25s ease; pointer-events:none; }
  .sticky.show{ transform:translateY(0); pointer-events:auto; }
  .sticky a{ width:100%; max-width:412px; animation:none; }
  @media (prefers-reduced-motion:reduce){ .sticky{ transition:none; } .cta{ animation:none; }
    .eq i{ animation:none; } .glitch::before,.glitch::after{ animation:none; opacity:0; } }

<script>
(function(){
  var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var TRACK_ID = '2XWSDi1w7lQaEZawG4TVDM';
  var ua = navigator.userAgent || '';
  var inApp = /FBAN|FBAV|FB_IAB|Instagram|Messenger|Line\/|Snapchat|Pinterest|TikTok|Twitter/i.test(ua);

  // ── IN-APP BROWSER ESCAPE BANNER ──
  // IG/FB/etc webviews trap the user logged-out, so Spotify plays become 30s previews,
  // not real streams. Nudge them to open in the real browser where the app launches.
  if(inApp){
    var banner = document.getElementById('iabBanner');
    if(banner) banner.hidden = false;
  }

  // ── SPOTIFY APP DEEP-LINK (attempt native app, fall back to web) ──
  // Tapping a Spotify link tries the spotify: URI first so the installed app opens
  // (and the play counts as a real stream), then falls back to the web URL.
  function openSpotify(e){
    var webUrl = this.href;
    e.preventDefault();
    var start = Date.now();
    var fell = false;
    function fallback(){
      if(fell) return; fell = true;
      // if the app opened, the tab is hidden / a lot of time passed — don't redirect
      if(document.hidden || Date.now() - start > 1800) return;
      window.location.href = webUrl;
    }
    // visibilitychange fires when the app takes over — cancels the fallback
    document.addEventListener('visibilitychange', function onv(){
      if(document.hidden){ fell = true; document.removeEventListener('visibilitychange', onv); }
    });
    try { window.location.href = 'spotify://track/' + TRACK_ID; } catch(err){}
    setTimeout(fallback, 1500);
  }
  document.querySelectorAll('a[data-track*="Spotify"], a.cover').forEach(function(a){
    a.addEventListener('click', openSpotify);
  });

  // ── OUTBOUND CLICK TRACKING (GA4 + Meta Pixel) ──
  document.querySelectorAll('a[data-track]').forEach(function(a){
    a.addEventListener('click', function(){
      var label = a.getAttribute('data-track'), dest = a.href;
      var toSpotify = /spotify\.com/i.test(dest);   // cover art, primary CTA + sticky all point to Spotify
      if(typeof gtag === 'function'){
        // generic event for every outbound click
        gtag('event', 'outbound_click', { link_label: label, link_url: dest, transport_type: 'beacon' });
        // dedicated, countable event for "people who reached Spotify"
        if(toSpotify){
          gtag('event', 'spotify_click', { link_label: label, link_url: dest, transport_type: 'beacon' });
        }
      }
      if(typeof fbq === 'function'){
        if(toSpotify){ fbq('track', 'Lead', { content_name: 'Spotify', source: label }); }
        else if(/Apple Music|YouTube/i.test(label)){ fbq('track', 'Lead', { content_name: label }); }
        else { fbq('trackCustom', 'LinkClick', { link_label: label, link_url: dest }); }
      }
    });
  });

  // ── STICKY Spotify CTA: reveal once the primary button scrolls out of view ──
  var primary = document.getElementById('primary'), sticky = document.getElementById('sticky');
  if(primary && sticky && 'IntersectionObserver' in window){
    new IntersectionObserver(function(entries){
      sticky.classList.toggle('show', !entries[0].isIntersecting);
      sticky.setAttribute('aria-hidden', String(entries[0].isIntersecting));
    }, { threshold: 0 }).observe(primary);
  }
})();
</script>
